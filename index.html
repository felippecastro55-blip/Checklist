<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"
        defer></script>
    <script src="index.js" defer></script>
</head>

<body class="bg-light p-4">


    <div class="container mt-5">
        <div class="row justify-content-center mb-3">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="mb-3 text-center">Adicionar Tarefa</h4>
                        <div class="row mb-3">
                            <div class="col">
                                <label for="data">Data</label>
                                <input class="form-control" id="data" type="text">
                            </div>
                            <div class="col">
                                <label for="hora">Hora</label>
                                <input class="form-control" id="hora" type="text">
                            </div>
                        </div>
                        <div class="input-group mb-3 buttonsSalvaCancelar">
                            <input type="text" id="tarefa" class="form-control" placeholder="Digite a tarefa...">
                            <button class="btn btn-primary" id="salvar">Salvar</button>
                        </div>
                        <span id="idTarefaEditada" hidden></span>
                    </div>
                </div>
            </div>
        </div>
        <table class="table table-hover table-striped listaTarefas">
            <colgroup>
                <col style="width: 120px;">
                <col style="width: 100px;">
                <col style="width: 50%;">
                <col style="width: 140px;">
                <col style="width: 80px;">
            </colgroup>

            <thead class="table-dark">
                <tr>
                    <th scope="col">Data</th>
                    <th scope="col">Hora</th>
                    <th scope="col">Tarefa</th>
                    <th scope="col">Status</th>
                    <th></th>
                </tr>
            </thead>

            <tbody>
                
            </tbody>
        </table>

    </div>

</body>

</html>
